<!DOCTYPE html>
<html>
<head>
    <title>Assignment 1b - User Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>User Registration Form</h1>

<form novalidate onsubmit="submitForm(); return false;">

    <label>Name</label>
    <input type="text" id="name" placeholder="Enter full name">
    <small class="error" id="nameError"></small>

    <label>Phone Number</label>
    <input type="text" id="phone" placeholder="10-digit mobile number">
    <small class="error" id="phoneError"></small>

    <label>Address</label>
    <textarea id="address" placeholder="Enter address"></textarea>
    <small class="error" id="addressError"></small>

    <label>Gender</label>
    <div class="radio-group">
        <input type="radio" name="gender" value="Male"> Male
        <input type="radio" name="gender" value="Female"> Female
    </div>
    <small class="error" id="genderError"></small>

    <label>City</label>
    <select id="city">
        <option value="">Select City</option>
        <option value="Pune" selected>Pune</option>
        <option value="Mumbai">Mumbai</option>
        <option value="Delhi">Delhi</option>
    </select>
    <small class="error" id="cityError"></small>

    <label>Email</label>
    <input type="text" id="email" placeholder="Enter email">
    <small class="error" id="emailError"></small>

    <label>Password</label>
    <input type="password" id="password" placeholder="Minimum 6 characters">
    <small class="error" id="passwordError"></small>

    <input type="submit" value="Submit Details">

</form>

<script src="script.js"></script>
</body>
</html>
